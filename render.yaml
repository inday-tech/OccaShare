services:
  - type: web
    name: occaserve-app
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: occaserve-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SECRET_KEY
        generateValue: true
      - key: KYC_ENCRYPTION_KEY
        sync: false # Set manually in Render Dashboard to keep it consistent
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

databases:
  - name: occaserve-db
    plan: free
    postgresMajorVersion: 16
